name: ci
on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          pip install -e ".[dev]"
      - name: Lint
        run: |
          ruff check src tests examples
          ruff format --check src tests examples
      - name: Test
        run: pytest -v
